; jarvis-recon-bot config
; Copy to config.ini on the VPS and fill in channel + user IDs.
; Secrets (bot token, Neon URI) live in separate files referenced below.

[discord]
; Absolute path to a file containing the bot token on one line.
token_file = /opt/jarvis-recon-bot/credentials/discord-bot.token
; Discord channel ID for #jarvis-hq. Right-click the channel with
; Developer Mode enabled to copy this. Bot ignores all other channels.
allowed_channel_id =
; Comma-separated Discord user IDs allowed to issue commands.
; Leave blank on first install — the bot will log the first unauthorized
; attempt so you can copy the real ID in.
allowed_user_ids =

[neon]
; Path to the Neon credentials JSON. We read
; .connection_uris[0].connection_uri from this file.
credentials_file = /opt/jarvis-recon-bot/credentials/neon.json

[bot]
; Seconds between polls for completed tasks.
poll_interval_seconds = 5
; Seconds to wait for a per-task result before editing the status message.
slow_task_threshold_seconds = 60
; Hard cap on polling a single task before giving up.
task_timeout_seconds = 300
